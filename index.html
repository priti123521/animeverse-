<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI AnimeVerse Dashboard v5.1 (Fixed)</title>

<style>
:root {
    --bg-dark: #0b0b0f;
    --card-bg: #18181f;
    --accent-orange: #ff6b00;
    --accent-red: #ff0000;
    --text-muted: #cccccc;
    --sidebar-width: 250px;
}

body {
    margin: 0;
    font-family: 'Segoe UI', Arial, sans-serif;
    background: var(--bg-dark);
    color: white;
    display: flex;
    min-height: 100vh;
}

/* SIDEBAR */
.sidebar {
    width: var(--sidebar-width);
    background: #0f0f15;
    border-right: 1px solid #222;
    position: fixed;
    height: 100vh;
    display: flex;
    flex-direction: column;
}

.sidebar-header {
    padding: 25px 20px;
    font-size: 24px;
    font-weight: bold;
    background: linear-gradient(90deg, var(--accent-orange), var(--accent-red));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.nav-item {
    padding: 13px 20px;
    color: var(--text-muted);
    cursor: pointer;
}

.nav-item:hover, .nav-item.active {
    color: white;
    background: #1a1a26;
    border-left: 4px solid var(--accent-orange);
}

/* MAIN */
.main-content {
    margin-left: var(--sidebar-width);
    flex-grow: 1;
    padding: 30px;
}

.dashboard-page { display: none; }
.dashboard-page.active-page { display: block; }

.card {
    background: var(--card-bg);
    padding: 20px;
    border-radius: 12px;
    border: 1px solid #222;
}

input {
    width: 100%;
    padding: 12px;
    background: #111;
    color: white;
    border: 1px solid #333;
    border-radius: 8px;
}

button {
    margin-top: 10px;
    padding: 10px 18px;
    border: none;
    border-radius: 8px;
    background: var(--accent-orange);
    color: white;
    cursor: pointer;
}

.result { margin-top: 15px; }

.gen-image {
    width: 100%;
    border-radius: 10px;
    margin-top: 10px;
}

/* LOGIN */
#login-gate {
    position: fixed;
    width: 100%;
    height: 100%;
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 999;
}

.login-box {
    background: var(--card-bg);
    padding: 30px;
    border-radius: 12px;
    width: 300px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login-gate">
    <div class="login-box">
        <h2>AnimeVerse Login</h2>
        <input id="usernameInput" placeholder="Enter username">
        <button onclick="handleLogin()">Enter</button>
    </div>
</div>

<!-- SIDEBAR -->
<nav class="sidebar">
    <div class="sidebar-header">🔥 AnimeVerse</div>

    <div class="nav-item active" data-page="home-page">🏠 Home</div>
    <div class="nav-item" data-page="character-page">🎨 Character Forge</div>
    <div class="nav-item" data-page="world-page">🌍 World</div>
    <div class="nav-item" data-page="movie-page">🎬 Movie</div>
    <div class="nav-item" data-page="gallery-page">🖼️ Gallery</div>
    <div class="nav-item" data-page="watch-page">📺 Watch</div>
    <div class="nav-item" data-page="library-page">📚 Library</div>
    <div class="nav-item" data-page="profile-page">👤 Profile</div>
    <div class="nav-item" data-page="pro-page">💎 Pro</div>
</nav>

<!-- MAIN -->
<main class="main-content">

<section id="home-page" class="dashboard-page active-page">
    <h1>Welcome <span id="welcomeName"></span></h1>
</section>

<section id="character-page" class="dashboard-page">
    <div class="card">
        <h2>Character Forge</h2>
        <input id="characterInput">
        <button onclick="runGeneration('character')">Generate</button>
        <div id="characterOutput"></div>
    </div>
</section>

<section id="world-page" class="dashboard-page">
    <div class="card">
        <h2>World Builder</h2>
        <input id="worldInput">
        <button onclick="runGeneration('world')">Generate</button>
        <div id="worldOutput"></div>
    </div>
</section>

<section id="movie-page" class="dashboard-page">
    <div class="card">
        <h2>Movie Studio</h2>
        <input id="movieInput">
        <button onclick="runGeneration('movie')">Generate</button>
        <div id="movieOutput"></div>
    </div>
</section>

<section id="library-page" class="dashboard-page">
    <div class="card">
        <h2>Library</h2>
        <div id="libraryContainer"></div>
    </div>
</section>

<section id="pro-page" class="dashboard-page">
    <div class="card">
        <h2>Pro Upgrade</h2>
        <button onclick="simulateUpgrade()">Upgrade</button>
    </div>
</section>

</main>

<script>
let isPremium = false;

/* NAVIGATION FIX */
document.querySelectorAll(".nav-item").forEach(item => {
    item.addEventListener("click", () => {
        switchTab(item.dataset.page, item);
    });
});

function switchTab(pageId, el) {
    document.querySelectorAll(".dashboard-page")
        .forEach(p => p.classList.remove("active-page"));

    document.querySelectorAll(".nav-item")
        .forEach(n => n.classList.remove("active"));

    document.getElementById(pageId).classList.add("active-page");
    el.classList.add("active");
}

/* LOGIN */
function handleLogin() {
    let name = document.getElementById("usernameInput").value;
    localStorage.setItem("user", name);
    document.getElementById("login-gate").style.display = "none";
    document.getElementById("welcomeName").innerText = name;
}

/* AI TEXT GENERATION */
async function generateAI(prompt) {
    const res = await fetch("https://text.pollinations.ai/" + encodeURIComponent(prompt));
    return await res.text();
}

/* MAIN GENERATION */
async function runGeneration(type) {
    let input = document.getElementById(type + "Input").value;
    let output = document.getElementById(type + "Output");

    output.innerHTML = "Generating...";

    let prompt = `Create anime ${type}: ${input}`;
    let text = await generateAI(prompt);

    let img = `https://image.pollinations.ai/p/${encodeURIComponent(input + ", anime style")}?seed=${Math.random() * 99999}`;

    output.innerHTML = `
        <div class="result">
            ${text}
            <img class="gen-image" src="${img}">
        </div>
    `;

    save(type, text, img);
}

/* SAVE */
function save(type, text, img) {
    let data = JSON.parse(localStorage.getItem("lib") || "[]");
    data.unshift({ type, text, img, time: Date.now() });
    localStorage.setItem("lib", JSON.stringify(data));
    renderLibrary();
}

/* LIBRARY FIX */
function renderLibrary() {
    let data = JSON.parse(localStorage.getItem("lib") || "[]");
    let box = document.getElementById("libraryContainer");

    if (!data.length) {
        box.innerHTML = "No data yet";
        return;
    }

    box.innerHTML = data.map(d => `
        <div class="card">
            <b>${d.type}</b><br>
            ${d.text}<br>
            <img src="${d.img}" style="width:100%; border-radius:10px;">
        </div>
    `).join("");
}

/* PRO */
function simulateUpgrade() {
    isPremium = true;
    alert("Upgraded!");
}

/* INIT */
window.onload = () => {
    let u = localStorage.getItem("user");
    if (u) {
        document.getElementById("login-gate").style.display = "none";
        document.getElementById("welcomeName").innerText = u;
    }
    renderLibrary();
};
</script>

</body>
</html>
