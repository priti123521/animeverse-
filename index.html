<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <button class="home-toggle" onclick="toggleHome()">Toggle Home</button>

    <div id="login-gate">
        <input id="usernameInput" placeholder="Username">
        <input id="passwordInput" type="password" placeholder="Password">
        <button onclick="handleLogin()">Enter</button>
    </div>

    <section id="home-page" class="dashboard-page active-page">
        <h1>Welcome <span id="welcomeName"></span></h1>

        <div class="card">
            <h3>⚡ Quick Actions</h3>
            <button onclick="switchTab('character-page')">Create Character</button>
            <button onclick="switchTab('world-page')">Build World</button>
            <button onclick="switchTab('movie-page')">Generate Movie</button>
        </div>

        <div class="card">
            <h3>📊 Recent Activity</h3>
            <div id="recentActivity">Loading...</div>
        </div>
    </section>

    <section id="profile-page" class="dashboard-page">
        <div class="card">
            <h2>👤 Profile Matrix</h2>
            <p><b>Username:</b> <span id="profileName"></span></p>
            <p><b>Password:</b> <span id="profilePass">••••</span></p>
            <p><b>Tier:</b> <span id="profileTier">Free User</span></p>
            <p><b>Total Creations:</b> <span id="profileCount"></span></p>

            <input type="text" id="avatarInput" placeholder="Paste profile image URL">
            <button onclick="setAvatar()">Set Profile Picture</button>

            <img id="avatarPreview" style="width:120px;height:120px;border-radius:50%;margin-top:10px;display:none;" alt="Avatar Preview">
        </div>
    </section>

    <script src="app.js"></script>
</body>
</html>
