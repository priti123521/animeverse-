<script>
// Randomization pools to make outcomes dynamic
const powers = [
    "Temporal Rewind & Chrono-Blades", "Shadow Necromancy", "Celestial Star-Summoning", 
    "Absolute Zero Cryomancy", "Void Alteration", "Cursed Flame Manifestation", 
    "Mechanical Alchemy", "Soul-Weaving Thread Manipulation"
];

const backstories = [
    "was raised by an exiled clan in hiding, training for the day they would reclaim their family's stolen throne.",
    "accidentally absorbed a forbidden artifact as a child and is now hunted by both a corrupt empire and rogue spirits.",
    "woke up in an ancient ruin with no memories, possessing a weapon that can cut through the fabric of reality itself.",
    "is a brilliant, cynical prodigy who unlocked a taboo magic style, choosing to fight the darkness alone from the shadows."
];

const worldThemes = [
    "where gravity acts unpredictably and floating landmasses are tethered together by massive, ancient iron chains.",
    "plunged into an eternal neon-lit twilight, where magic-infused technology is fueled by harvested stardust.",
    "carved entirely into the roots of a world-spanning tree, where the upper branches harbor gods and the depths hide monsters.",
    "shattered into thousands of moving tectonic plates controlled by powerful, rivaling guild airships."
];

const moviePlots = [
    "A reluctant crew must pull off a dangerous heist against an immortal emperor to steal back the sun.",
    "When a massive rift opens in the sky, an estranged master and student must reunite to seal it before time itself unravels.",
    "A high-stakes survival tournament where the prize isn't glory, but the right to rewrite one historical event.",
    "An ancient, mechanical deity awakens from a thousand-year slumber, forcing rival nations to form an uneasy alliance."
];

// Helper function to pick a random item from an array
function getRandom(arr) {
    return arr[Math.floor(Math.random() * arr.length)];
}

function characterGen(){
    let idea = document.getElementById("characterInput").value;
    if(!idea) return alert("Please enter a character prompt!");
    
    let randomPower = getRandom(powers);
    let randomStory = getRandom(backstories);
    
    document.getElementById("characterOutput").innerHTML = `
        <b>Concept:</b> ${idea}<br><br>
        <b>Powers:</b> ${randomPower}<br><br>
        <b>Story:</b> The character ${randomStory}
    `;
}

function worldGen(){
    let idea = document.getElementById("worldInput").value;
    if(!idea) return alert("Please enter a world prompt!");
    
    let randomTheme = getRandom(worldThemes);
    
    document.getElementById("worldOutput").innerHTML = `
        <b>World Core:</b> ${idea}<br><br>
        <b>Lore:</b> A breathtaking realm ${randomTheme}
    `;
}

function movieGen(){
    let idea = document.getElementById("movieInput").value;
    if(!idea) return alert("Please enter a movie prompt!");
    
    let randomPlot = getRandom(moviePlots);
    
    document.getElementById("movieOutput").innerHTML = `
        <b>Title Idea:</b> ${idea}<br><br>
        <b>Synopsis:</b> ${randomPlot}
    `;
}
</script>
